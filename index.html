    <link rel="stylesheet" href="style.css">

<body id="main-body">

    <header>
        <div class="container nav-content">
            <a href="#" class="logo">Asset<span>Flow</span> Premium</a>
            <div class="lang-switcher">
                <button onclick="changeLanguage('en')" class="btn-lang active" id="btn-en">EN</button>
                <button onclick="changeLanguage('ar')" class="btn-lang" id="btn-ar">AR</button>
                <button onclick="changeLanguage('fr')" class="btn-lang" id="btn-fr">FR</button>
                <button onclick="changeLanguage('es')" class="btn-lang" id="btn-es">ES</button>
                <button onclick="changeLanguage('it')" class="btn-lang" id="btn-it">IT</button>

        </div>

    <main class="container">
        <section class="hero">
            <h1 id="txt-hero-title">Specializing in AI-Driven Domains and Global Tech Infrastructure.</h1>
            <div class="hero-btns">
                <a href="#portfolio" id="txt-view-btn">View Portfolio</a>

        <div id="portfolio-list"></div>

    <section class="contact-area">
        <div class="container">
            <h2 id="txt-contact-title">Direct Acquisition</h2>
            <div class="contact-grid">
                <div class="contact-card">
                    <i class="fas fa-phone-alt"></i>
                    <strong>Call Us</strong>
                    <span>+1 (731) 273-4860</span>
                </div>
                <div class="contact-card">
                    <i class="fab fa-whatsapp"></i>
                    <strong>WhatsApp</strong>
                    <span>Business Chat</span>
                </div>
                <div class="contact-card">
                    <i class="fas fa-envelope"></i>
                    <strong>Email</strong>
                    <span>sales@shinwariecommerce.com</span>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="legal-links">
                <a href="#" id="txt-privacy">Privacy</a>
                <a href="#" id="txt-refund">Refund</a>
                <a href="#" id="txt-terms">Terms</a>

            <p id="txt-copy">&copy; 2026 AssetFlow Premium. All Rights Reserved.</p>

    <script src="script.js"></script>
